# Simple workflow for deploying static content to GitHub Pages
name: Deploy April 2026 Demo to GitHub Pages
env:
  DOMAIN_OUTPUT: './domain_tutorial.2026.04.yaml'
  MD_OUTPUT: './domain.2026.04.md'
on:
  # Runs after the main workflow completes successfully
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Build and compile ALFA policies
  build:
    # Only run if the main workflow succeeded, or if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '11'

      - run: java -jar "bin/alfac.jar" "./alfa" -o ./demo-2026-04/xacml 
      - run: bin/domtool-0.9.0/bin/domtool domain --identity=demo.2026.04 --main-policy-id=http://axiomatics.com/alfa/identifier/demo.main --attributes=./demo-2026-04/config/attributes.yaml  -o ${{ env.DOMAIN_OUTPUT }} --xacml-specifications ./demo-2026-04/xacml 

      - name: Upload domain output
        uses: actions/upload-artifact@v4
        with:
          name: domain-output
          path: |
            ${{ env.DOMAIN_OUTPUT }}
            ./demo-2026-04/xacml

  # Job 2: Analyze domain (depends on build)
  analyze:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download domain output
        uses: actions/download-artifact@v4
        with:
          name: domain-output
      
      - name: Analyze Domain
        uses: davidjbrossard/domain-analyzer@v1.5
        with:
          domain-file: ${{ env.DOMAIN_OUTPUT }}
          output-file: ${{ env.MD_OUTPUT}}
      
      - name: Upload analysis output
        uses: actions/upload-artifact@v4
        with:
          name: analysis-output
          path: ${{ env.MD_OUTPUT }}

  # Job 3: Deploy to GitHub Pages (depends on analyze)
  deploy:
    needs: analyze
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download domain output
        uses: actions/download-artifact@v4
        with:
          name: domain-output
      - name: Download analysis output
        uses: actions/download-artifact@v4
        with:
          name: analysis-output
      
      - run: |
          mkdir -p ./_site
          cp search-interop.yaml ./_site/${{ env.DOMAIN_OUTPUT }}
          cp ./ads_deployment.yaml ./_site
          cp ${{ env.MD_OUTPUT }} ./_site
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
