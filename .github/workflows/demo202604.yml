# Simple workflow for deploying static content to GitHub Pages
name: Deploy April 2026 Demo to GitHub Pages
env:
  DOMAIN_OUTPUT: './domain_tutorial.2026.04.yaml'
  MD_OUTPUT: './domain.2026.04.md'
on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:                # Job-level permissions configuration starts here
      contents: write           # 'write' access to repository contents
      id-token: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '11'

      - run: java -jar "bin/alfac.jar" "./alfa" -o ./demo-2026-04/xacml 
      - run: bin/domtool-0.9.0/bin/domtool domain --identity=demo.2026.04 --main-policy-id=http://axiomatics.com/alfa/identifier/demo.main --attributes=./demo-2026-04/config/attributes.yaml  -o ${{ env.DOMAIN_OUTPUT }} --xacml-specifications ./demo-2026-04/xacml 

      - name: Analyze Domain
        uses: davidjbrossard/domain-analyzer@v1.5
        with:
          domain-file: ${{ env.DOMAIN_OUTPUT }}
          output-file: ${{ env.MD_OUTPUT}}
      - run: |
          mkdir -p ./_site
          cp search-interop.yaml ./_site/${{ env.DOMAIN_OUTPUT }}
          cp ./ads_deployment.yaml ./_site
          cp ${{ env.MD_OUTPUT }} ./_site
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.MD_OUTPUT }}
          git status
          git commit -a -m "Update ${{ env.MD_OUTPUT }}"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
